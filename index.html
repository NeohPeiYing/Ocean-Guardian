<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Guardian</title>
    <link rel="icon" href="Image/oceanguardianlogo.png" type="Image/oceanguardianlogo.ico">
    <link rel="stylesheet" href="CSS/intro.css">
    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="intro">
        <!-- Ocean -->
        <div class="ocean"></div>
        <!-- Water Glow -->
        <div class="water-glow"></div>
        <!-- Light Rays -->
        <div class="light-rays"></div>
        <!-- Caustics -->
        <div class="caustics"></div>
        <!-- Floating Particles -->
        <div class="particles"></div>
        <!-- Bubble Container -->
        <div class="bubble-container"></div>
        <!-- Vignette -->
        <div class="vignette"></div>

        <div class="welcome-content">
            <h1>Welcome to Ocean Guardian</h1>
            <p>
                Discover the wonders of our oceans and learn how together
                we can protect marine life for future generations.
            </p>

            <button class="enter-btn">
                Enter</button>

            </div>

            <button class="skip-btn">
                Click to skip
            </button>
        </div>
        <script src="Javascript/intro.js"></script>
</body>
